name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Privacy statement guard (must exist — do not delete)
        run: |
          test -f app/privacy/page.tsx || { echo "::error::web/app/privacy/page.tsx is missing — the privacy statement must NOT be deleted."; exit 1; }
          grep -q "PRIVACY-GUARD-DO-NOT-DELETE" app/privacy/page.tsx || { echo "::error::privacy page lost its PRIVACY-GUARD-DO-NOT-DELETE marker."; exit 1; }
          grep -q "full ownership of your data" app/privacy/page.tsx || { echo "::error::privacy page lost its data-ownership statement."; exit 1; }

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
