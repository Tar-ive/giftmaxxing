<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Giftmaxxing — prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Hanken Grotesk", -apple-system, system-ui, sans-serif;
    background:
      radial-gradient(120% 90% at 15% 0%, #F6E9DC, transparent 55%),
      radial-gradient(120% 90% at 90% 10%, #F3DFE6, transparent 50%),
      #ECE4D9;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::-webkit-scrollbar { width: 0; height: 0; display: none; }
  * { scrollbar-width: none; }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
  input { font-family: inherit; }
  @keyframes gmFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes gmSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes gmScreen { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  #root { width: 100%; }
</style>
</head>

<div id="root"></div>
